<body>

  <button onclick="login()">Login</button>

  <table id="dataTable"></table>

<script>
const msalConfig = {
  auth: {
    clientId: "768e8544-9eab-40cb-940e-5ba478af614f",
    authority: "https://login.microsoftonline.com/consumers",
    redirectUri: "http://localhost:5500"
  }
};

const msalInstance = new msal.PublicClientApplication(msalConfig);

const scopes = ["Files.Read"];

// Change this after checking List Root / List Documents
const filePath = "Master.xlsx";

// Change this if your sheet tab has a different name
const sheetName = "Transaction";

function log(message) {
  document.getElementById("debug").textContent += message + "\n";
}

function clearOutput() {
  document.getElementById("debug").textContent = "";
  document.getElementById("dataTable").innerHTML = "";
}

async function login() {
  try {
    clearOutput();

    await msalInstance.initialize();

    const result = await msalInstance.loginPopup({
      scopes: scopes
    });

    document.getElementById("status").innerText =
      "Logged in as " + result.account.username;

    log("Login successful");

  } catch (err) {
    log("LOGIN ERROR: " + err.message);
    alert(err.message);
    console.error(err);
  }
}

async function getToken() {
  await msalInstance.initialize();

  const account = msalInstance.getAllAccounts()[0];

  if (!account) {
    throw new Error("Please click Login first.");
  }

  const result = await msalInstance.acquireTokenSilent({
    scopes: scopes,
    account: account
  });

  return result.accessToken;
}

async function graphFetch(url, token) {
  const response = await fetch(url, {
    headers: {
      Authorization: `Bearer ${token}`
    }
  });

  if (!response.ok) {
    const errorText = await response.text();
    throw new Error(response.status + " " + errorText);
  }

  return response;
}

async function listRoot() {
  try {
    clearOutput();

    const token = await getToken();

    log("Listing OneDrive root...");

    const response = await graphFetch(
      "https://graph.microsoft.com/v1.0/me/drive/root/children",
      token
    );

    const data = await response.json();

    data.value.forEach(item => {
      log(item.name + " | " + (item.folder ? "folder" : "file"));
    });

  } catch (err) {
    log("ERROR: " + err.message);
    console.error(err);
  }
}

async function listDocuments() {
  try {
    clearOutput();

    const token = await getToken();

    log("Listing Documents folder...");

    const response = await graphFetch(
      "https://graph.microsoft.com/v1.0/me/drive/root:/Documents:/children",
      token
    );

    const data = await response.json();

    data.value.forEach(item => {
      log(item.name + " | " + (item.folder ? "folder" : "file"));
    });

  } catch (err) {
    log("ERROR: " + err.message);
    console.error(err);
  }
}

async function readMasterFile() {
  try {
    clearOutput();

    log("Getting Microsoft token...");
    const token = await getToken();

    log("Downloading OneDrive file: " + filePath);

    const encodedPath = filePath
      .split("/")
      .map(part => encodeURIComponent(part))
      .join("/");

    const downloadUrl =
      "https://graph.microsoft.com/v1.0/me/drive/root:/" +
      encodedPath +
      ":/content";

    const fileResponse = await graphFetch(downloadUrl, token);
    const arrayBuffer = await fileResponse.arrayBuffer();

    log("Reading Excel workbook...");

    const workbook = XLSX.read(arrayBuffer, {
      type: "array"
    });

    log("Sheets found: " + workbook.SheetNames.join(", "));

    const worksheet = workbook.Sheets[sheetName];

    if (!worksheet) {
      throw new Error("Sheet not found: " + sheetName);
    }

    log("Reading sheet: " + sheetName);

    const rows = XLSX.utils.sheet_to_json(worksheet, {
      header: 1,
      blankrows: false
    });

    log("Rows found: " + rows.length);

    showTable(rows);

  } catch (err) {
    log("ERROR: " + err.message);
    alert(err.message);
    console.error(err);
  }
}

function showTable(rows) {
  const table = document.getElementById("dataTable");
  table.innerHTML = "";

  rows.forEach((row, rowIndex) => {
    const tr = document.createElement("tr");

    row.forEach(cell => {
      const cellElement = document.createElement(
        rowIndex === 0 ? "th" : "td"
      );

      cellElement.innerText = cell ?? "";
      tr.appendChild(cellElement);
    });

    table.appendChild(tr);
  });
}
</script>
