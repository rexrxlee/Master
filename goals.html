<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Goals — Fintrack</title>
  <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ── Goals Page Overrides ───────────────────────────────────────── */

    #goalsContainer {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-bottom: 40px;
    }

    /* Panel (generic card) */
    .goals-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px 20px;
    }
    details.goals-panel > summary.panel-header {
      list-style: none;
      cursor: pointer;
    }
    details.goals-panel > summary.panel-header::-webkit-details-marker { display: none; }
    .collapsible-panel:not([open]) { padding-bottom: 20px; }
    .collapsible-body {
      margin-top: 14px;
    }
    .panel-spacer { flex: 1; }
    .panel-caret {
      color: var(--muted);
      font-size: 12px;
      transition: transform 0.15s;
    }
    details[open] > summary .panel-caret { transform: rotate(180deg); }
    .panel-count-pill {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 600;
      white-space: nowrap;
    }
    .panel-count-pill.red {
      color: #7f1d1d;
      border-color: #fca5a5;
      background: #fef2f2;
    }

    .panel-header {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 0;
    }
    .panel-header h2 { font-size: 15px; font-weight: 600; margin: 0; }
    .goals-panel.collapsible-panel > summary.panel-header { margin-bottom: 0; }
    .panel-icon { font-size: 16px; flex-shrink: 0; }
    .panel-hint { font-size: 12.5px; color: var(--muted); margin-left: 4px; }
    .goals-autosave-status {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      font-weight: 600;
      white-space: nowrap;
    }
    .goals-autosave-status.ok {
      color: #14532d;
      border-color: #86efac;
      background: #f0fdf4;
    }
    .goals-autosave-status.error {
      color: #7f1d1d;
      border-color: #fca5a5;
      background: #fef2f2;
    }

    /* Account selector */
    .acct-selector-panel .panel-header { margin-bottom: 0; }
    details.acct-selector-panel[open] .panel-header { margin-bottom: 12px; }
    .simple-account-summary {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 12.5px;
      font-weight: 600;
    }
    .acct-checklist {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .acct-check-label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      font-size: 13.5px;
      transition: background 0.12s, border-color 0.12s;
      user-select: none;
    }
    .acct-check-label:hover { background: var(--bg); }
    .acct-check-label input { accent-color: var(--text); }
    .acct-bal { font-family: 'DM Mono', monospace; font-size: 12.5px; font-weight: 600; margin-left: 4px; }
    .acct-bal.green { color: var(--green); }
    .acct-bal.red   { color: var(--red); }

    /* Balance flow */
    .balance-panel .panel-header { margin-bottom: 12px; }
    .balance-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      align-items: start;
    }
    .goals-summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(150px, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }
    .summary-metric {
      min-width: 0;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
    }
    .summary-metric span {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 11.5px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 600;
    }
    .summary-metric strong {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: 'DM Mono', monospace;
      font-size: 20px;
      line-height: 1.2;
    }
    .summary-metric.primary strong { font-size: 24px; }
    .summary-metric strong.green { color: var(--green); }
    .summary-metric strong.red { color: var(--red); }
    .summary-metric.warn-row {
      border-color: #fca5a5;
      background: #fff7f7;
    }
    .goals-summary-grid .capacity-metric {
      min-height: 100%;
      background: var(--bg);
    }
    .goals-summary-grid .claim-risk-note {
      grid-column: 1 / -1;
      max-width: none;
      margin-top: 0;
    }
    .capacity-details {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      padding: 0;
    }
    .capacity-details > summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      cursor: pointer;
      color: var(--muted);
      font-size: 12.5px;
      font-weight: 600;
      list-style: none;
    }
    .capacity-details > summary::-webkit-details-marker { display: none; }
    .capacity-details[open] > summary {
      border-bottom: 1px solid var(--border);
    }
    .capacity-details-body {
      padding: 12px;
    }
    .capacity-flow {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 0;
    }
    .capacity-hero {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .capacity-label,
    .capacity-source,
    .capacity-side span,
    .capacity-meter-caption,
    .capacity-metric span,
    .capacity-chip span,
    .capacity-chip small {
      color: var(--muted);
      font-size: 12px;
    }
    .capacity-value {
      display: block;
      margin-top: 5px;
      font-family: 'DM Mono', monospace;
      font-size: 30px;
      line-height: 1.1;
      letter-spacing: 0;
    }
    .capacity-value.green { color: var(--green); }
    .capacity-value.red { color: var(--red); }
    .capacity-source {
      display: block;
      margin-top: 5px;
    }
    .capacity-side {
      flex: 0 0 auto;
      min-width: 112px;
      text-align: right;
    }
    .capacity-side strong {
      display: block;
      margin-top: 5px;
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      color: var(--text);
    }
    .capacity-meter {
      height: 10px;
      border-radius: 999px;
      background: var(--border);
      overflow: hidden;
    }
    .capacity-meter-fill {
      height: 100%;
      border-radius: inherit;
      transition: width 0.25s ease;
    }
    .capacity-meter-fill.green { background: var(--green); }
    .capacity-meter-fill.red { background: var(--red); }
    .capacity-meter-caption {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: -6px;
    }
    .capacity-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .capacity-chip {
      display: inline-flex;
      align-items: baseline;
      gap: 7px;
      max-width: 100%;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      font-size: 12px;
    }
    .capacity-chip strong {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      white-space: nowrap;
    }
    .capacity-chip.in strong { color: var(--green); }
    .capacity-chip.out strong,
    .capacity-chip.warn strong { color: var(--red); }
    .capacity-chip small {
      max-width: 190px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .capacity-metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .capacity-metric {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
    }
    .capacity-metric strong {
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .capacity-metric strong.green { color: var(--green); }
    .capacity-metric strong.red { color: var(--red); }
    .capacity-metric.warn-row {
      border-color: #fca5a5;
      background: #fff7f7;
    }
    .claim-cash-metric {
      margin-top: -4px;
    }
    .claim-risk-note {
      margin-top: 8px;
      max-width: 480px;
      border-radius: 7px;
      padding: 9px 11px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      font-size: 12.5px;
      line-height: 1.45;
    }
    .claim-risk-note.active {
      background: #fffbeb;
      border: 1px solid #f59e0b;
      color: #78350f;
    }
    .claim-risk-note.safe {
      background: #f8fafc;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .claim-risk-note strong {
      color: inherit;
      font-size: 12.5px;
    }

    /* Stats */
    .stats-panel .panel-header { margin-bottom: 14px; }
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      max-width: 560px;
    }
    .stat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .stat-l { color: var(--muted); }
    .stat-v { font-family: 'DM Mono', monospace; font-weight: 600; }
    .stat-v.green { color: var(--green); }
    .stat-v.red   { color: var(--red); }
    .stats-note {
      max-width: 560px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    /* Realism check */
    .analysis-panel .panel-header { margin-bottom: 0; }
    details.analysis-panel[open] > summary.panel-header { margin-bottom: 14px; }
    .analysis-stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .analysis-panel .goals-panel {
      box-shadow: none;
    }
    .realism-panel .panel-header { margin-bottom: 14px; }
    .rc-body { display: flex; flex-direction: column; gap: 8px; }
    .rc-issue {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 7px;
      padding: 10px 14px;
      font-size: 13px;
      color: #7f1d1d;
      line-height: 1.5;
    }
    .rc-tip {
      background: #f0fdf4;
      border: 1px solid #86efac;
      border-radius: 7px;
      padding: 10px 14px;
      font-size: 13px;
      color: #14532d;
      line-height: 1.5;
    }
    .rc-summary {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: var(--bg);
      border-radius: 7px;
      font-size: 13px;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    .rc-summary .green { color: var(--green); }
    .rc-summary .red   { color: var(--red); }

    /* Goal momentum */
    .motivation-panel .panel-header { margin-bottom: 14px; }
    .gm-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(260px, 0.75fr);
      gap: 14px;
      align-items: stretch;
    }
    .gm-hero {
      border: 1px solid #bfdbfe;
      border-left: 4px solid #2563eb;
      background: #eff6ff;
      border-radius: 8px;
      padding: 14px 16px;
      min-width: 0;
    }
    .gm-kicker {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #1d4ed8;
      margin-bottom: 5px;
    }
    .gm-hero h3 {
      font-size: 16px;
      line-height: 1.35;
      margin: 0 0 8px;
      color: #1e3a8a;
    }
    .gm-hero p {
      margin: 0;
      font-size: 13px;
      line-height: 1.55;
      color: #1e40af;
    }
    .gm-impact {
      margin-top: 10px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 10px;
      border-radius: 20px;
      border: 1px solid #93c5fd;
      background: #dbeafe;
      color: #1e3a8a;
      font-size: 12.5px;
      font-weight: 600;
    }
    .gm-side {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
    }
    .gm-stat {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      padding: 10px 0;
      border-top: 1px solid var(--border);
      font-size: 13px;
    }
    .gm-stat:last-child { border-bottom: 1px solid var(--border); }
    .gm-stat span {
      color: var(--muted);
      min-width: 0;
    }
    .gm-stat strong {
      font-family: 'DM Mono', monospace;
      white-space: nowrap;
    }
    .gm-stat strong.green { color: var(--green); }
    .gm-stat strong.red { color: var(--red); }
    .gm-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .gm-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      border-radius: 20px;
      padding: 5px 10px;
      font-size: 12px;
      color: var(--muted);
    }
    .gm-chip strong {
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
    }

    /* Add goal panel */
    .add-goal-panel .panel-header { margin-bottom: 0; }

    /* Goals grid */
    .goals-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 16px;
    }

    /* Goal card */
    .goal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .goal-card-top {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .goal-kpis {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
    }
    .gkpi {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 8px 10px;
      background: var(--bg);
      border-radius: 7px;
    }
    .gkpi-l { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .gkpi-v { font-size: 13.5px; font-weight: 600; font-family: 'DM Mono', monospace; }
    .gkpi-v.green { color: var(--green); }
    .gkpi-v.red   { color: var(--red); }

    .goal-progress-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .goal-pbar {
      flex: 1;
      height: 8px;
      background: var(--border);
      border-radius: 20px;
      overflow: hidden;
    }
    .goal-pfill { height: 100%; border-radius: 20px; transition: width 0.4s ease; }
    .goal-pct-label { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--muted); flex-shrink: 0; width: 38px; text-align: right; }

    .goal-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 12px;
      color: var(--muted);
    }
    .goal-compact-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }
    .goal-compact-meta strong {
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
    }
    .goal-compact-meta strong.red { color: var(--red); }
    .goal-card-details {
      border-top: 1px solid var(--border);
      padding-top: 8px;
    }
    .goal-card-details summary {
      cursor: pointer;
      color: var(--muted);
      font-size: 12.5px;
      font-weight: 600;
      list-style: none;
    }
    .goal-card-details summary::-webkit-details-marker { display: none; }
    .goal-card-detail-body {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
    }
    .goal-buffer-line {
      font-size: 12.5px;
      color: #7c2d12;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: 7px;
      padding: 7px 10px;
    }
    .goal-buffer-line.ok {
      color: #14532d;
      background: #f0fdf4;
      border-color: #86efac;
    }
    .goal-forecast-line { font-size: 13px; color: var(--blue); }
    .goal-req-line  { font-size: 12.5px; color: #ea580c; }
    .goal-rec-line  { font-size: 12.5px; color: var(--green); }
    .goal-tx-line   { font-size: 12px; color: var(--muted); }

    /* Deadline badges */
    .deadline-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .deadline-badge.overdue { background: #fef2f2; color: #dc2626; border: 1px solid #fca5a5; }
    .deadline-badge.behind  { background: #fff7ed; color: #ea580c; border: 1px solid #fed7aa; }
    .deadline-badge.ontrack { background: #f0fdf4; color: #16a34a; border: 1px solid #86efac; }
    .deadline-badge.buffer  { background: #fff7ed; color: #b45309; border: 1px solid #f59e0b; }
    .deadline-badge.priority { background: #eef2ff; color: #4338ca; border: 1px solid #c7d2fe; }

    /* Goal edit/deduct forms */
    .goal-edit-form {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      background: #fafafa;
      margin-top: 6px;
    }

    /* Goal form grid */
    .goal-form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .gf-group { display: flex; flex-direction: column; gap: 4px; }
    .gf-group.full { grid-column: 1 / -1; }
    .gf-group label { font-size: 12px; font-weight: 500; color: var(--muted); }
    .gf-group input, .gf-group select {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface);
    }
    .gf-group input:focus, .gf-group select:focus {
      outline: none;
      border-color: var(--text);
    }
    .goal-force-check {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
    }
    .goal-force-check input {
      width: auto;
      padding: 0;
      accent-color: var(--text);
    }

    /* Buttons */
    .btn-primary {
      padding: 10px 20px;
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 13.5px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-secondary {
      padding: 10px 20px;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 13.5px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.12s;
    }
    .btn-secondary:hover { background: var(--bg); }
    .btn-sm { padding: 7px 14px; font-size: 13px; }
    .btn-icon {
      padding: 5px 8px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.12s;
    }
    .btn-icon:hover { background: var(--bg); }
    .btn-icon-danger:hover { background: #fef2f2; border-color: #fca5a5; }
    .btn-deduct {
      padding: 6px 14px;
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fca5a5;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.12s;
    }

    /* ── Overspend Alert ─────────────────────────────────────────────── */
    .overspend-alert {

      gap: 12px;

      border-radius: 8px;

      margin-bottom: 14px;
    }
    .overspend-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
    .overspend-body { display: flex; flex-direction: column; gap: 4px; font-size: 13px; color: #7f1d1d; }
    .overspend-body strong { font-size: 14px; }
    .overspend-body span { color: #991b1b; line-height: 1.5; }
    .btn-rebalance {
      margin-top: 6px;
      align-self: flex-start;
      padding: 6px 14px;
      background: #dc2626;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 12.5px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-rebalance:hover { opacity: 0.85; }

    /* ── Fund Allocator ─────────────────────────────────────────────── */
    .alloc-section {
      margin-top: 0;
      min-width: 0;
    }
    .alloc-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 6px;
    }
    .alloc-title { font-size: 14px; font-weight: 600; }
    .alloc-header-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .btn-smart-assign {
      padding: 8px 16px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    .btn-smart-assign:hover { opacity: 0.88; }

    .alloc-hint { display: none; }
    .alloc-col-labels {
      display: none;
      grid-template-columns: 1fr 1fr auto;
      gap: 12px;
      padding: 0 0 6px;
      font-size: 11px;
      font-weight: 600;

      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }
    .alloc-col-label-name {}
    .alloc-col-label-bar {}
    .alloc-col-label-inp { text-align: right; }

    .alloc-rows { display: flex; flex-direction: column; gap: 6px; }
    .alloc-row {
      display: grid;
      grid-template-columns: minmax(240px, 1.2fr) minmax(160px, 0.8fr) auto;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .alloc-name-col { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .alloc-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .alloc-name { font-size: 13.5px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .alloc-sub { font-size: 11.5px; color: var(--muted); margin-top: 1px; }
    .alloc-priority-badge {
      display: inline-flex;
      vertical-align: middle;
      margin-left: 5px;
      padding: 1px 7px;
      border: 1px solid #c7d2fe;
      border-radius: 999px;
      background: #eef2ff;
      color: #4338ca;
      font-size: 10.5px;
      font-weight: 600;
    }
    .alloc-force-label {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 4px;
      color: var(--muted);
      font-size: 11.5px;
      cursor: pointer;
      user-select: none;
    }
    .alloc-force-label input {
      accent-color: var(--text);
    }

    .alloc-bar-col { display: flex; align-items: center; gap: 8px; }
    .alloc-pbar { flex: 1; height: 6px; background: var(--border); border-radius: 20px; overflow: hidden; }
    .alloc-pfill { height: 100%; border-radius: 20px; transition: width 0.3s ease; }
    .alloc-pct { font-size: 11.5px; font-family: 'DM Mono', monospace; color: var(--muted); flex-shrink: 0; width: 32px; text-align: right; }

    .alloc-input-col { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .alloc-input-wrap {
      display: flex;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 7px;
      overflow: hidden;
      background: var(--surface);
    }
    .alloc-buffer-inp-wrap {
      display: flex;
      align-items: center;
      border: 1px solid #fed7aa;
      border-radius: 7px;
      overflow: hidden;
      background: #fff7ed;
    }
    .alloc-currency { padding: 0 6px; font-size: 13px; color: var(--muted); background: var(--bg); border-right: 1px solid var(--border); line-height: 34px; }
    .alloc-input { width: 80px; padding: 7px 8px; border: none; font-size: 13px; font-family: 'DM Mono', monospace; color: var(--text); background: transparent; outline: none; }
    .alloc-tag-stack {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
      max-width: 230px;
    }
    .alloc-need-tag   { font-size: 11px; color: #ea580c; background: #fff7ed; border: 1px solid #fed7aa; border-radius: 20px; padding: 1px 8px; white-space: nowrap; }
    .alloc-done-tag   { font-size: 11px; color: #16a34a; background: #f0fdf4; border: 1px solid #86efac; border-radius: 20px; padding: 1px 8px; white-space: nowrap; }
    .alloc-claim-tag  { font-size: 11px; color: #92400e; background: #fffbeb; border: 1px solid #f59e0b; border-radius: 20px; padding: 1px 8px; white-space: nowrap; }

    .alloc-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .alloc-unassigned-bar-wrap { flex: 1; min-width: 180px; }
    .alloc-unassigned-label { font-size: 12.5px; color: var(--muted); margin-bottom: 5px; }
    .alloc-ubar-track { height: 7px; background: var(--border); border-radius: 20px; overflow: hidden; }
    .alloc-ubar-fill { height: 100%; border-radius: 20px; transition: width 0.3s ease; }
    .alloc-ubar-fill.green { background: var(--green); }
    .alloc-ubar-fill.red   { background: var(--red); }

    /* ── Timeline Chart ──────────────────────────────────────────────── */
    .timeline-forecast-note {
      margin-top: 10px;
      font-size: 12.5px;
      color: var(--muted);
    }

    .timeline-forecast-note strong {
      color: var(--text);
      font-family: 'DM Mono', monospace;
    }
    .timeline-panel {}
    .timeline-chart-simple {
      margin-top: 8px;
    }
    .timeline-impact-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .timeline-impact-details {
      margin-top: 14px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }
    .timeline-impact-details summary {
      cursor: pointer;
      color: var(--muted);
      font-size: 12.5px;

    .timeline-impact-row {

      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-left: 4px solid #16a34a;
      border-radius: 8px;
      font-size: 12.5px;
    }
    .timeline-impact-row.warn {
      border-left-color: #ea580c;
      background: #fff7ed;
      border-color: #fed7aa;
    }
    .timeline-impact-row.danger {
      border-left-color: #dc2626;
      background: #fef2f2;
      border-color: #fca5a5;
    }
    .ti-goal {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .ti-goal div,
    .ti-status {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .ti-goal strong,
    .ti-status strong {
      font-size: 13px;
      color: var(--text);
    }
    .ti-goal span,
    .ti-status span,
    .ti-metric span {
      color: var(--muted);
    }
    .ti-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .ti-metric {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .ti-metric strong {
      font-family: 'DM Mono', monospace;
      font-size: 12.5px;
      color: var(--text);
    }
    .timeline-legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .timeline-completion-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .timeline-comp-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--bg);
      border-radius: 8px;
      border-left-width: 3px;
      border-left-style: solid;
      font-size: 12.5px;
    }
    .tc-icon { color: #16a34a; font-weight: 700; }
    .tc-name { font-weight: 600; }
    .tc-date { color: var(--muted); }
    .tc-val  { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); margin-left: 4px; }

    /* ── Goal Gantt timeline ─── */
    .gantt-panel .panel-header { margin-bottom: 10px; }
    .gantt-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0 12px;
    }
    .gantt-stat {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg);
      font-size: 12px;
      color: var(--muted);
    }
    .gantt-stat strong {
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
    }
    .gantt-scroll {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: #fff;
      position: relative;
    }
    .gantt {
      min-width: 980px;
    }
    .gantt-months,
    .gantt-row {
      display: grid;
      grid-template-columns: var(--gantt-label-width, 230px) minmax(var(--gantt-axis-width, 620px), 1fr) var(--gantt-status-width, 280px);
      border-bottom: 1px solid var(--border);
    }
    .gantt-row:last-child { border-bottom: none; }
    .gantt-months {
      position: sticky;
      top: 0;
      z-index: 3;
      background: var(--bg);
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .gantt-corner,
    .gantt-status-head {
      padding: 9px 12px;
      border-right: 1px solid var(--border);
    }
    .gantt-status-head {
      border-right: none;
      border-left: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      right: 0;
      z-index: 30;
      box-shadow: -8px 0 14px -14px rgba(15,23,42,0.75);
    }
    .gantt-month-grid {
      display: grid;
      position: relative;
      min-height: 38px;
    }
    .gantt-track {
      position: relative;
      min-height: 38px;
      overflow: hidden;
      isolation: isolate;
      z-index: 1;
    }
    .gantt-month {
      padding: 9px 0;
      text-align: center;
      border-right: 1px solid rgba(0,0,0,0.05);
      white-space: nowrap;
    }
    .gantt-label {
      padding: 11px 12px;
      border-right: 1px solid var(--border);
      min-width: 0;
    }
    .gantt-title {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
    }
    .gantt-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .gantt-title strong {
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .gantt-meta {
      margin-top: 3px;
      font-size: 11.5px;
      color: var(--muted);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .gantt-track {
      align-items: center;
      padding: 9px 0;
      background-image: linear-gradient(to right, rgba(0,0,0,0.04) 1px, transparent 1px);
      background-size: calc(100% / var(--gantt-months)) 100%;
    }
    .gantt-bar {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      height: 18px;
      border-radius: 20px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.65);
      min-width: 10px;
      z-index: 1;
    }
    .gantt-bar.ok { opacity: 0.82; }
    .gantt-bar.warn { background: #f59e0b !important; opacity: 0.75; }
    .gantt-bar.danger { background: #ef4444 !important; opacity: 0.75; }
    .gantt-bar.neutral { background: #94a3b8 !important; opacity: 0.75; }
    .gantt-line {
      position: absolute;
      top: 6px;
      bottom: 6px;
      width: 0;
      z-index: 4;
    }
    .gantt-line.today { border-left: 2px solid #111827; opacity: 0.5; }
    .gantt-line.deadline { border-left: 2px dashed currentColor; }
    .gantt-month-values {
      position: absolute;
      inset: 0;
      display: grid;
      align-items: center;
      z-index: 3;
      pointer-events: none;
    }
    .gantt-month-value-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
      padding: 0 3px;
    }
    .gantt-month-value {
      max-width: 100%;
      padding: 1px 5px;
      border-radius: 999px;
      border: 1px solid rgba(203,213,225,0.95);
      background: rgba(255,255,255,0.84);
      color: #475569;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      box-shadow: 0 1px 2px rgba(15,23,42,0.06);
    }
    .gantt-month-value.current {
      background: #111827;
      border-color: #111827;
      color: #fff;
    }
    .gantt-month-value.base-need {
      background: rgba(255,255,255,0.78);
      color: #64748b;
    }
    .gantt-month-value.base-met {
      background: #dcfce7;
      border-color: #86efac;
      color: #14532d;
    }
    .gantt-month-value.buffer-met {
      background: #dcfce7;
      border-color: #86efac;
      color: #14532d;
    }
    .gantt-base-marker {
      position: absolute;
      top: 7px;
      transform: translateX(-50%);
      z-index: 6;
      display: inline-flex;
      align-items: center;
      height: 15px;
      padding: 0 5px;
      border-radius: 999px;
      border: 1px solid #fdba74;
      background: #fff7ed;
      color: #7c2d12;
      font-size: 8.5px;
      font-weight: 700;
      line-height: 1;
      text-transform: uppercase;
      box-shadow: 0 0 0 2px #fff;
      pointer-events: auto;
    }
    .gantt-status {
      padding: 9px 12px;
      border-left: 1px solid var(--border);
      background: #fff;
      position: sticky;
      right: 0;
      z-index: 30;
      box-shadow: -8px 0 14px -14px rgba(15,23,42,0.75);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 3px;
      min-width: 0;
    }
    .gantt-pill {
      display: inline-flex;
      width: fit-content;
      max-width: 100%;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11.5px;
      font-weight: 600;
      white-space: nowrap;
    }
    .gantt-pill.ok { color: #14532d; background: #dcfce7; border: 1px solid #86efac; }
    .gantt-pill.warn { color: #7c2d12; background: #fff7ed; border: 1px solid #fed7aa; }
    .gantt-pill.danger { color: #7f1d1d; background: #fef2f2; border: 1px solid #fca5a5; }
    .gantt-pill.neutral { color: #475569; background: #f1f5f9; border: 1px solid #cbd5e1; }
    .gantt-status small {
      color: var(--muted);
      font-size: 11.5px;
      line-height: 1.35;
    }
    .gantt-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
    }
    .gantt-legend span {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .gantt-legend .sample-bar {
      width: 18px;
      height: 8px;
      border-radius: 10px;
      background: #94a3b8;
    }
    .gantt-legend .sample-line {
      width: 0;
      height: 14px;
      border-left: 2px dashed #64748b;
    }
    .gantt-legend .sample-value {
      width: 34px;
      height: 14px;
      border-radius: 999px;
      border: 1px solid #cbd5e1;
      background: #fff;
      display: inline-block;
    }
    .gantt-legend .sample-base {
      height: 14px;
      padding: 0 5px;
      border-radius: 999px;
      border: 1px solid #fdba74;
      background: #fff7ed;
      color: #7c2d12;
      font-size: 8.5px;
      font-weight: 700;
      font-style: normal;
      line-height: 14px;
      text-transform: uppercase;
    }

    /* ── Timeline custom legend ─── */
    .tl-legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12.5px;

    /* ── Boost panel ─── */

      display: flex;
      gap: 16px;
      margin: 12px 0;
      flex-wrap: wrap;
    }
    .boost-ex-row {
      display: flex;
      align-items: flex-start;

      flex: 1;

      padding: 8px 12px;

    .boost-ex-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }

      display: grid;
      grid-template-columns: minmax(160px, 1.8fr) minmax(118px, 1fr) minmax(86px, 0.75fr) minmax(112px, 0.85fr) minmax(220px, 1.7fr) minmax(150px, 1.15fr) 32px;
      gap: 8px;
      padding: 0 0 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }
    .boost-th { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .boost-row {
      display: grid;
      grid-template-columns: minmax(160px, 1.8fr) minmax(118px, 1fr) minmax(86px, 0.75fr) minmax(112px, 0.85fr) minmax(220px, 1.7fr) minmax(150px, 1.15fr) 32px;

    .boost-input:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99,102,241,0.12); }
    .boost-number { width: 70px; text-align: right; }
    .boost-amt-wrap { display: flex; align-items: center; gap: 4px; }
    .boost-currency { font-size: 13px; color: var(--muted); flex-shrink: 0; }
    .boost-currency.boost { color: #16a34a; font-weight: 600; }
    .boost-currency.reduce { color: #dc2626; font-weight: 600; }
    .boost-per-mo { font-size: 12px; color: var(--muted); flex-shrink: 0; white-space: nowrap; }
    .boost-dates-row { display: flex; align-items: center; gap: 6px; flex-wrap: nowrap; }
    .boost-date-group { display: flex; flex-direction: column; gap: 2px; }
    .boost-date-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.03em; }
    .boost-date-control {
      display: flex;
      align-items: stretch;
      width: 112px;
      position: relative;
    }
    .boost-month-input {
      min-width: 0;
      width: 100%;
      padding: 6px 7px;
      border: 1px solid var(--border);
      border-right: 0;
      border-radius: 6px 0 0 6px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
    }
    .boost-month-input:disabled {
      color: var(--muted);
      background: var(--bg);
    }
    .boost-month-input::placeholder { color: var(--muted); }
    .boost-date-btn {
      width: 28px;
      border: 1px solid var(--border);
      border-radius: 0 6px 6px 0;
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      line-height: 1;

      cursor: not-allowed;
      color: var(--muted);
      background: var(--bg);
    }
    .boost-month-picker {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      z-index: 80;
      width: 204px;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 12px 28px rgba(15,23,42,0.14);
    }
    .bmp-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .bmp-head button,
    .bmp-grid button,
    .bmp-clear {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
    }
    .bmp-head button {
      width: 28px;
      height: 26px;
    }
    .bmp-head strong {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
    }
    .bmp-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
    }
    .bmp-grid button {
      padding: 6px 0;
    }
    .bmp-grid button:hover,
    .bmp-head button:hover,
    .bmp-clear:hover {
      background: var(--bg);
    }
    .bmp-grid button.active {
      border-color: var(--text);
      background: var(--text);
      color: var(--surface);
      font-weight: 600;
    }
    .bmp-clear {
      width: 100%;
      margin-top: 6px;
      padding: 6px 0;
      color: var(--muted);
    }
    .boost-duration-tag {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
      max-width: 128px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .boost-duration-tag.permanent { background: #f0fdf4; color: #16a34a; border: 1px solid #86efac; }
    .boost-duration-tag.temporary { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
    .boost-duration-tag.once { background: #fff7ed; color: #9a3412; border: 1px solid #fed7aa; }
    .boost-select { width: 100%; padding: 7px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: inherit; }
    .boost-select:disabled { color: var(--muted); background: var(--bg); }
    .boost-kind-select.boost { color: #14532d; background: #f0fdf4; border-color: #86efac; }
    .boost-kind-select.reduce { color: #7f1d1d; background: #fef2f2; border-color: #fca5a5; }
    .boost-del-btn { padding: 4px 8px; border: 1px solid #fca5a5; background: #fef2f2; color: #dc2626; border-radius: 5px; cursor: pointer; font-size: 12px; }
    .boost-del-btn:hover { background: #fee2e2; }

    /* ── Add goal calc ─── */
    .gf-alloc-display {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
    }
    .gf-alloc-amount { font-family: 'DM Mono', monospace; font-weight: 600; font-size: 14px; flex: 1; }
    .gf-alloc-override-link { font-size: 12px; color: var(--muted); cursor: pointer; text-decoration: underline; white-space: nowrap; }
    .gf-alloc-override-link:hover { color: var(--text); }
    .gf-label-hint { font-size: 11px; font-weight: 400; color: var(--muted); margin-left: 6px; }
    .gf-calc-summary { margin-top: 14px; }
    .gf-calc-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
    }
    .gf-calc-row.ok     { background: #f0fdf4; border: 1px solid #86efac; color: #14532d; }
    .gf-calc-row.warn   { background: #fff7ed; border: 1px solid #fed7aa; color: #7c2d12; }
    .gf-calc-row.neutral{ background: var(--bg); border: 1px solid var(--border); color: var(--muted); }
    .gf-calc-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .gf-calc-body strong { font-size: 14px; }
    .gf-calc-sub { font-size: 12px; margin-top: 4px; opacity: 0.85; }
    .gf-suggestions { margin-top: 10px; }
    .gf-suggest-label { font-size: 11.5px; color: var(--muted); margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
    .gf-suggest-btns { display: flex; gap: 8px; flex-wrap: wrap; }
    .gf-suggest-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1.5px solid;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      transition: background 0.12s, transform 0.1s;
      text-align: left;
    }
    .gf-suggest-btn:hover { transform: translateY(-1px); }
    .gf-suggest-now    { background: #eff6ff; border-color: #93c5fd; color: #1e3a8a; }
    .gf-suggest-now:hover { background: #dbeafe; }
    .gf-suggest-comfort{ background: #f0fdf4; border-color: #86efac; color: #14532d; }
    .gf-suggest-comfort:hover { background: #dcfce7; }
    .gf-suggest-late   { background: #fff7ed; border-color: #fed7aa; color: #7c2d12; }
    .gf-suggest-late:hover { background: #ffedd5; }
    .gfs-icon { font-size: 16px; flex-shrink: 0; }
    .gfs-body { display: flex; flex-direction: column; gap: 1px; }
    .gfs-title { font-weight: 600; font-size: 13px; }
    .gfs-sub { font-size: 11.5px; opacity: 0.75; }

    @media (max-width: 700px) {
      .goals-summary-grid { grid-template-columns: 1fr; }
      .alloc-row { grid-template-columns: 1fr auto; }
      .alloc-bar-col { display: none; }
      .alloc-col-labels { grid-template-columns: 1fr auto; }
      .alloc-col-label-bar { display: none; }
      .balance-layout { grid-template-columns: 1fr; }
      .capacity-hero { flex-direction: column; gap: 10px; }
      .capacity-side { text-align: left; }
      .capacity-metrics { grid-template-columns: 1fr; }
      .panel-count-pill { margin-left: 0; }
      .timeline-impact-row { grid-template-columns: 1fr; align-items: stretch; }
      .gm-grid { grid-template-columns: 1fr; }
      .gantt-months, .gantt-row { grid-template-columns: var(--gantt-label-width, 190px) minmax(var(--gantt-axis-width, 520px), 1fr) var(--gantt-status-width, 230px); }
      .boost-row, .boost-table-header { grid-template-columns: 1fr; }
      .boost-del-cell { justify-self: end; }
    }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .goals-grid { grid-template-columns: 1fr; }
      .goal-kpis { grid-template-columns: repeat(2, 1fr); }
      .stats-grid { grid-template-columns: 1fr; }
      .goal-form-grid { grid-template-columns: 1fr; }
    }

    /* ══════════════════════════════════════════════════════════════
       TAB BAR
    ══════════════════════════════════════════════════════════════ */
    .gi-tab-bar {
      display: flex;
      gap: 4px;
      padding: 0 0 0 0;
      margin-bottom: 20px;
      border-bottom: 2px solid var(--border);
    }
    .gi-tab {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 10px 18px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      font-family: inherit;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      position: relative;
    }
    .gi-tab:hover { color: var(--text); }
    .gi-tab.active {
      color: var(--text);
      border-bottom-color: var(--text);
      font-weight: 600;
    }
    .gi-tab-icon { font-size: 14px; }
    .gi-tab-badge {
      background: #dc2626;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 20px;
      line-height: 1.5;
    }

    /* ══════════════════════════════════════════════════════════════
       GOAL ITEMS — PLANNER TAB
    ══════════════════════════════════════════════════════════════ */

    /* Loading / empty states */
    .gi-loading, .gi-error {
      padding: 48px;
      text-align: center;
      font-size: 14px;
      color: var(--muted);
    }
    .gi-error { color: var(--red); }
    .gi-empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 80px 32px;
      text-align: center;
    }
    .gi-empty-icon { font-size: 40px; opacity: 0.25; }
    .gi-empty-title { font-size: 17px; font-weight: 600; color: var(--text); }
    .gi-empty-sub { font-size: 13.5px; color: var(--muted); max-width: 380px; line-height: 1.6; }

    /* Header bar */
    .gi-header-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .gi-header-summary {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .gi-sum-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12.5px;
      font-weight: 500;
      border: 1px solid transparent;
    }
    .gi-sum-pill.neutral { background: var(--bg); border-color: var(--border); color: var(--muted); }
    .gi-sum-pill.warn    { background: #fff7ed; border-color: #fed7aa; color: #7c2d12; }
    .gi-sum-pill.ok      { background: #f0fdf4; border-color: #86efac; color: #14532d; }
    .gi-sum-pill.red     { background: #fef2f2; border-color: #fca5a5; color: #7f1d1d; }
    .gi-save-btn {
      padding: 8px 16px;
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .gi-save-btn:hover { opacity: 0.85; }
    .gi-save-btn:disabled { opacity: 0.5; cursor: default; }
    .gi-autosave-status {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      color: var(--muted);
      font-size: 12.5px;
      font-weight: 600;
      white-space: nowrap;
    }
    .gi-autosave-status.ok {
      color: #14532d;
      border-color: #86efac;
      background: #f0fdf4;
    }
    .gi-autosave-status.error {
      color: #7f1d1d;
      border-color: #fca5a5;
      background: #fef2f2;
    }

    /* Goal sections */
    .gi-goals-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-bottom: 48px;
    }
    .gi-goal-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    /* Section header */
    .gi-section-header {
      padding: 14px 18px;
      cursor: pointer;
      user-select: none;
      transition: background 0.1s;
      /* border-left is set inline per goal color */
    }
    .gi-section-header:hover { background: var(--bg); }
    .gi-section-title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .gi-chevron {
      font-size: 10px;
      color: var(--muted);
      transition: transform 0.2s ease;
      flex-shrink: 0;
      display: inline-block;
    }
    .gi-chevron.open { transform: rotate(90deg); }
    .gi-section-name {
      font-size: 14.5px;
      font-weight: 600;
      color: var(--text);
    }
    .gi-hdr-count {
      font-size: 11.5px;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1px 8px;
    }
    .gi-hdr-overdue {
      font-size: 11.5px;
      color: #dc2626;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 20px;
      padding: 1px 8px;
    }
    .gi-section-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .gi-meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .gi-meta-label { font-size: 11.5px; color: var(--muted); }
    .gi-meta-val   { font-size: 13px; font-weight: 600; font-family: 'DM Mono', monospace; }
    .gi-meta-val.red { color: var(--red); }

    /* Budget badges */
    .gi-budget-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .gi-budget-badge.under   { background: #f0fdf4; border-color: #86efac; color: #14532d; }
    .gi-budget-badge.over    { background: #fef2f2; border-color: #fca5a5; color: #7f1d1d; }
    .gi-budget-badge.exact   { background: #f0fdf4; border-color: #86efac; color: #14532d; }
    .gi-budget-badge.neutral { background: var(--bg); border-color: var(--border); color: var(--muted); }
    .gi-bump-btn {
      margin-left: 4px;
      padding: 2px 8px;
      background: #dc2626;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      font-weight: 600;
    }
    .gi-bump-btn:hover { opacity: 0.85; }

    /* Progress bar in section header */
    .gi-section-progress {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }
    .gi-prog-bar {
      flex: 1;
      max-width: 300px;
      height: 5px;
      background: var(--border);
      border-radius: 20px;
      overflow: hidden;
    }
    .gi-prog-fill { height: 100%; border-radius: 20px; transition: width 0.4s ease; }
    .gi-prog-label { font-size: 11.5px; color: var(--muted); font-family: 'DM Mono', monospace; flex-shrink: 0; }

    /* Section body (collapsible) */
    .gi-section-body {
      display: none;
      border-top: 1px solid var(--border);
    }
    .gi-section-body.open { display: block; }
    .gi-no-items {
      padding: 24px 20px;
      font-size: 13.5px;
      color: var(--muted);
      font-style: italic;
    }

    /* Items table */
    .gi-table-wrap {
      overflow-x: auto;
    }
    .gi-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .gi-table thead tr {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .gi-table th {
      padding: 9px 12px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      white-space: nowrap;
    }
    .gi-th-check    { width: 32px; }
    .gi-th-desc     { min-width: 180px; }
    .gi-th-amt      { width: 120px; }
    .gi-th-date     { width: 100px; }
    .gi-th-pri      { width: 90px; }
    .gi-th-link     { width: 48px; text-align: center; }
    .gi-th-comments { min-width: 140px; }
    .gi-th-status   { width: 130px; }
    .gi-th-actions  { width: 120px; }

    /* Item rows */
    .gi-item-row td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .gi-item-row:last-of-type td { border-bottom: none; }
    .gi-row-purchased { opacity: 0.7; }
    .gi-row-cancelled { opacity: 0.45; }
    .gi-row-overdue   { background: #fffbeb; }

    .gi-desc-text { font-weight: 500; }
    .gi-strikethrough { text-decoration: line-through; color: var(--muted); }
    .gi-mono { font-family: 'DM Mono', monospace; font-size: 12.5px; }
    .gi-muted { color: var(--muted); }
    .gi-actual-diff {
      display: block;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      margin-top: 2px;
    }
    .gi-actual-diff.red   { color: var(--red); }
    .gi-actual-diff.green { color: var(--green); }
    .gi-overdue-text { color: #dc2626; font-weight: 600; }
    .gi-pri-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
      flex-shrink: 0;
    }
    .gi-link-btn {
      display: inline-block;
      text-decoration: none;
      font-size: 16px;
      padding: 2px 4px;
      border-radius: 4px;
      transition: background 0.1s;
    }
    .gi-link-btn:hover { background: var(--bg); }
    .gi-link-empty { color: var(--muted); }
    .gi-comment-text { color: var(--muted); font-size: 12px; cursor: default; }

    /* Status badges */
    .gi-status-badge {
      display: inline-flex;
      flex-direction: column;
      gap: 1px;
      font-size: 11.5px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 6px;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .gi-status-badge small { font-weight: 400; font-size: 10.5px; line-height: 1.3; }
    .gi-status-badge.planned   { background: #eff6ff; border-color: #bfdbfe; color: #1e40af; }
    .gi-status-badge.purchased { background: #f0fdf4; border-color: #86efac; color: #14532d; }
    .gi-status-badge.cancelled { background: var(--bg); border-color: var(--border); color: var(--muted); }
    .gi-status-badge.overdue   { background: #fef2f2; border-color: #fca5a5; color: #dc2626; }

    /* Action buttons */
    .gi-td-actions { white-space: nowrap; }
    .gi-action-btn {
      padding: 4px 8px;
      border: 1px solid var(--border);
      background: transparent;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      margin-right: 2px;
      transition: background 0.1s, border-color 0.1s;
    }
    .gi-action-btn:hover    { background: var(--bg); }
    .gi-edit-btn:hover      { border-color: #6366f1; color: #6366f1; }
    .gi-buy-btn             { background: #f0fdf4; border-color: #86efac; color: #14532d; font-weight: 600; }
    .gi-buy-btn:hover       { background: #dcfce7; }
    .gi-cancel-btn:hover    { background: #fff7ed; border-color: #fed7aa; color: #7c2d12; }
    .gi-del-btn:hover       { background: #fef2f2; border-color: #fca5a5; color: #dc2626; }
    .gi-undo-btn            { color: var(--muted); }
    .gi-undo-btn:hover      { background: #eff6ff; border-color: #bfdbfe; color: #1e40af; }

    /* Inline edit panel */
    .gi-edit-row td { padding: 0 !important; }
    .gi-edit-panel {
      padding: 14px 16px;
      background: #fafafa;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .gi-edit-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .gi-edit-group { display: flex; flex-direction: column; gap: 4px; }
    .gi-edit-full  { grid-column: 1 / -1; }
    .gi-edit-label { font-size: 11.5px; font-weight: 500; color: var(--muted); }
    .gi-edit-input {
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface);
      width: 100%;
      box-sizing: border-box;
    }
    .gi-edit-input:focus { outline: none; border-color: var(--text); box-shadow: 0 0 0 2px rgba(0,0,0,0.06); }
    .gi-edit-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .gi-save-item-btn {
      padding: 7px 16px;
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .gi-save-item-btn:hover { opacity: 0.85; }
    .gi-cancel-edit-btn {
      padding: 7px 14px;
      background: var(--surface);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
    }
    .gi-cancel-edit-btn:hover { background: var(--bg); }

    /* Add item form (inside <details>) */
    .gi-add-row {
      padding: 4px 0 0;
      border-top: 1px dashed var(--border);
    }
    .gi-add-details { }
    .gi-add-summary {
      padding: 11px 18px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      list-style: none;
      transition: color 0.1s;
      user-select: none;
    }
    .gi-add-summary:hover { color: var(--text); }
    .gi-add-summary::-webkit-details-marker { display: none; }
    .gi-add-form {
      padding: 14px 18px 16px;
      border-top: 1px solid var(--border);
      background: #fafafa;
    }
    .gi-add-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .gi-add-group { display: flex; flex-direction: column; gap: 4px; }
    .gi-add-full  { grid-column: 1 / -1; }
    .gi-add-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .gi-add-confirm-btn {
      padding: 8px 18px;
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .gi-add-confirm-btn:hover { opacity: 0.85; }
    .gi-add-cancel-btn {
      padding: 8px 14px;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
    }
    .gi-add-cancel-btn:hover { background: var(--bg); }
    .gi-check { accent-color: var(--text); width: 15px; height: 15px; cursor: pointer; }

    /* ── Purchase Modal ── */
    .gi-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .gi-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) + 2px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.18);
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .gi-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--border);
    }
    .gi-modal-title { font-size: 15px; font-weight: 600; }
    .gi-modal-close {
      background: transparent;
      border: none;
      font-size: 16px;
      cursor: pointer;
      color: var(--muted);
      padding: 2px 6px;
      border-radius: 4px;
      transition: background 0.1s;
    }
    .gi-modal-close:hover { background: var(--bg); color: var(--text); }
    .gi-modal-body {
      padding: 18px 20px;
      flex: 1;
    }
    .gi-modal-item-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 2px;
      color: var(--text);
    }
    .gi-modal-item-goal {
      font-size: 12.5px;
      color: var(--muted);
      margin-bottom: 16px;
    }
    .gi-modal-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }
    .gi-modal-group { display: flex; flex-direction: column; gap: 4px; }
    .gi-modal-full  { grid-column: 1 / -1; }
    .gi-modal-hint { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .gi-modal-info {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12.5px;
      color: #1e40af;
      line-height: 1.5;
      margin-bottom: 10px;
    }
    .gi-modal-info-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
    .gi-modal-diff {
      padding: 7px 12px;
      border-radius: 7px;
      font-size: 12.5px;
      font-weight: 600;
      font-family: 'DM Mono', monospace;
      margin-top: 4px;
    }
    .gi-modal-diff.over  { background: #fef2f2; color: #dc2626; border: 1px solid #fca5a5; }
    .gi-modal-diff.under { background: #f0fdf4; color: #16a34a; border: 1px solid #86efac; }
    .gi-modal-footer {
      display: flex;
      gap: 10px;
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }
    .gi-confirm-purchase-btn {
      flex: 1;
      padding: 10px;
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 14px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .gi-confirm-purchase-btn:hover { opacity: 0.88; }
    .gi-confirm-purchase-btn:disabled { opacity: 0.5; cursor: default; }
    .gi-modal-cancel-btn {
      padding: 10px 18px;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
    }
    .gi-modal-cancel-btn:hover { background: var(--surface); }

    @media (max-width: 700px) {
      .gi-edit-grid, .gi-add-grid, .gi-modal-fields { grid-template-columns: 1fr; }
      .gi-edit-full, .gi-add-full, .gi-modal-full { grid-column: 1; }
      .gi-table th, .gi-table td { padding: 8px 8px; }
    }

    /* ── Feasibility Insights Panel ─────────────────────────────────── */
    .gi-insights-panel {
      margin: 0 20px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--bg);
    }
    .gi-insights-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      cursor: pointer;
      user-select: none;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .gi-insights-header:hover { background: var(--bg); }
    .gi-insights-title { font-size: 13px; font-weight: 600; color: var(--text); }
    .gi-insights-chevron { font-size: 12px; color: var(--muted); }
    .gi-insights-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
    .gi-insights-table-wrap {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .gi-insights-chart-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 10px 10px 6px;
    }
    .gi-insights-chart-scroll {
      max-height: 560px;
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 4px;
    }
    .gi-insights-chart-box {
      position: relative;
      min-height: 270px;
    }
    .gi-insights-chart-box canvas {
      width: 100% !important;
      height: 100% !important;
    }
    .gi-insights-summary {
      font-size: 13px;
      font-weight: 500;
      padding: 8px 12px;
      border-radius: 6px;
    }
    .gi-insights-summary.ok      { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .gi-insights-summary.warn    { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }
    .gi-insights-summary.neutral { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
    .gi-insights-summary-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .gi-ins-pill {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }
    .gi-ins-pill.ok      { background: #f0fdf4; border-color: #86efac; color: #14532d; }
    .gi-ins-pill.track   { background: #eff6ff; border-color: #bfdbfe; color: #1e40af; }
    .gi-ins-pill.risk    { background: #fef2f2; border-color: #fca5a5; color: #7f1d1d; }
    .gi-ins-pill.neutral { background: var(--surface); border-color: var(--border); color: var(--muted); }
    .gi-target-strip-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 10px 12px;
    }
    .gi-target-strip-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      font-size: 12px;
      color: var(--muted);
    }
    .gi-target-strip-head strong {
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      white-space: nowrap;
    }
    .gi-target-strip {
      position: relative;
      display: flex;
      height: 18px;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #f8fafc;
    }
    .gi-target-segment {
      flex-grow: 0;
      flex-shrink: 0;
      min-width: 2px;
      height: 100%;
      border-right: 1px solid rgba(255,255,255,0.72);
    }
    .gi-target-segment.purchased { background: #16a34a; }
    .gi-target-segment.track     { background: #2563eb; }
    .gi-target-segment.risk      { background: #dc2626; }
    .gi-target-segment.nodate    { background: #64748b; }
    .gi-target-segment.unallocated {
      background: repeating-linear-gradient(135deg, #f1f5f9 0, #f1f5f9 6px, #e2e8f0 6px, #e2e8f0 12px);
      border-right: none;
      min-width: 0;
    }
    .gi-target-marker {
      position: absolute;
      top: -4px;
      bottom: -4px;
      width: 2px;
      background: #111827;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.75);
    }
    .gi-target-strip-axis {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 5px;
      color: var(--muted);
      font-size: 11px;
      font-family: 'DM Mono', monospace;
    }
    .gi-target-legend {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 14px;
      color: var(--muted);
      font-size: 11.5px;
    }
    .gi-target-legend span {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }
    .gi-target-legend-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      flex-shrink: 0;
    }
    .gi-target-legend-dot.purchased { background: #16a34a; }
    .gi-target-legend-dot.track     { background: #2563eb; }
    .gi-target-legend-dot.risk      { background: #dc2626; }
    .gi-target-legend-dot.nodate    { background: #64748b; }
    .gi-insights-mini-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .gi-insights-mini-note strong {
      color: var(--text);
      font-weight: 600;
    }
    .gi-ins-details {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      overflow: hidden;
    }
    .gi-ins-details-summary {
      cursor: pointer;
      padding: 9px 12px;
      color: #7f1d1d;
      font-size: 12.5px;
      font-weight: 600;
      user-select: none;
    }
    .gi-ins-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .gi-ins-table th,
    .gi-ins-table td {
      padding: 7px 10px;
      border-top: 1px solid var(--border);
      text-align: left;
      white-space: nowrap;
    }
    .gi-ins-table th {
      color: var(--muted);
      font-size: 10.5px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .gi-ins-risk-cell {
      color: #dc2626;
      font-weight: 600;
      font-family: 'DM Mono', monospace;
    }
    .gi-insight-item-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .gi-insight-item-row:last-of-type { border-bottom: none; }
    .gi-insight-item-left  { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
    .gi-insight-item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; min-width: 160px; }
    .gi-insight-icon { font-size: 16px; flex-shrink: 0; }
    .gi-insight-item-info  { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .gi-insight-item-name  { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .gi-insight-item-meta  { font-size: 11.5px; color: var(--muted); }
    .gi-insight-bar-wrap   { width: 160px; height: 6px; background: var(--border); border-radius: 999px; overflow: hidden; }
    .gi-insight-bar        { height: 100%; border-radius: 999px; transition: width 0.4s ease; }
    .gi-insight-status     { font-size: 12px; font-weight: 600; white-space: nowrap; }
    .gi-insight-no-dates   { font-size: 13px; color: var(--muted); font-style: italic; padding: 4px 0; }
    .gi-insights-note      { font-size: 11.5px; color: var(--muted); padding-top: 4px; border-top: 1px solid var(--border); }
    @media (max-width: 700px) {
      .gi-insights-panel { margin: 0 10px 14px; }
      .gi-insights-body { padding: 12px; }
      .gi-insights-chart-scroll { max-height: 480px; }
      .gi-insights-chart-wrap { padding: 8px 6px 4px; }
      .gi-target-strip-head { align-items: flex-start; flex-direction: column; gap: 3px; }
      .gi-ins-table { min-width: 560px; }
      .gi-ins-details { overflow-x: auto; }
      .gi-insight-item-row { flex-direction: column; align-items: flex-start; gap: 6px; }
      .gi-insight-item-right { width: 100%; align-items: flex-start; }
      .gi-insight-bar-wrap { width: 100%; }
    }
  </style>
</head>
<body onload="loadGoalsPage()">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="brand-icon">◈</span>
      <span class="brand-name">Fintrack</span>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html"          class="nav-item"><span class="nav-icon">▦</span> Dashboard</a>
      <a href="goals.html"          class="nav-item active"><span class="nav-icon">◎</span> Goals</a>
      <a href="monthly-budget.html" class="nav-item"><span class="nav-icon">▤</span> Budget</a>
      <a href="insurance.html"      class="nav-item"><span class="nav-icon">▥</span> Insurance</a>
      <a href="add-transaction.html"class="nav-item"><span class="nav-icon">＋</span> Add Transaction</a>
      <a href="accounts.html"       class="nav-item"><span class="nav-icon">▣</span> Accounts & Setup</a>
    </nav>
    <div class="sidebar-status">
      <p id="status"></p>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="page-title" id="pageTitle">Goals</h1>
        <p class="page-subtitle" id="pageSubtitle">Savings goals and forecasts</p>
      </div>
      <div class="topbar-right">
        <button class="reload-btn" id="reloadBtn" onclick="loadGoalsPage()">↻ Reload</button>
      </div>
    </header>

    <!-- Tab bar -->
    <div class="gi-tab-bar">
      <button class="gi-tab active" id="tabOverview" onclick="switchGoalsTab('overview')">
        <span class="gi-tab-icon">◎</span> Overview
      </button>
      <button class="gi-tab" id="tabPlanner" onclick="switchGoalsTab('planner')">
        <span class="gi-tab-icon">📋</span> Purchase Planner
        <span class="gi-tab-badge" id="plannerBadge" style="display:none;"></span>
      </button>
    </div>

    <details class="debug-panel">
      <summary>System Log</summary>
      <pre id="debug"></pre>
    </details>

    <!-- Overview tab content -->
    <div id="overviewTab">
      <div id="goalsContainer"></div>
    </div>

    <!-- Planner tab content -->
    <div id="plannerTab" style="display:none;">
      <div id="plannerTabContent">
        <div class="gi-loading">Loading purchase planner…</div>
      </div>
    </div>

  </main>

  <script src="config.js"></script>
  <script src="onedrive.js"></script>
  <script src="goals.js"></script>
  <script src="goal-items.js"></script>
  <script>
    // ── Tab switching ──────────────────────────────────────────────
    let _activeGoalsTab = "overview";
    let _plannerLoaded  = false;

    function switchGoalsTab(tab) {
      _activeGoalsTab = tab;

      // Tab button states
      document.getElementById("tabOverview").classList.toggle("active", tab === "overview");
      document.getElementById("tabPlanner").classList.toggle("active", tab === "planner");

      // Panel visibility
      document.getElementById("overviewTab").style.display = tab === "overview" ? "" : "none";
      document.getElementById("plannerTab").style.display  = tab === "planner"  ? "" : "none";

      // Reload button target
      const reloadBtn = document.getElementById("reloadBtn");
      if (tab === "planner") {
        reloadBtn.onclick = () => { _plannerLoaded = false; loadGoalItemsTab(); };
        document.getElementById("pageTitle").textContent    = "Purchase Planner";
        document.getElementById("pageSubtitle").textContent = "Purchases by goal";
        if (!_plannerLoaded) {
          loadGoalItemsTab();
          _plannerLoaded = true;
        }
      } else {
        reloadBtn.onclick = () => loadGoalsPage();
        document.getElementById("pageTitle").textContent    = "Goals";
        document.getElementById("pageSubtitle").textContent = "Savings goals and forecasts";
      }
    }

    // After goals load, update the planner badge with overdue count
    const _origRenderGoalsPage = typeof renderGoalsPage === "function" ? renderGoalsPage : null;
    // Hook: after loadGoalsPage resolves, refresh badge
    const _origLoadGoalsPage = window.loadGoalsPage;
    window.loadGoalsPage = async function() {
      await _origLoadGoalsPage.apply(this, arguments);
      // Refresh planner badge if planner was already loaded
      if (_plannerLoaded) {
        _plannerLoaded = false; // force reload on next tab switch
        const badge = document.getElementById("plannerBadge");
        if (badge) badge.style.display = "none";
      }
    };
  </script>
</body>
</html>
